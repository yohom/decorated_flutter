name: decorated_flutter
description: (自家用) Common encapsulation of Flutter includes the implementation of BLoC pattern and other widget combination.
version: 0.52.1-dev.2
homepage: https://github.com/yohom/decorated_flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # 网络请求 https://pub.flutter-io.cn/packages/dio 5.2.0修改了CancelToken的行为, (至少)Stream类型的响应无法取消
  dio: "^5.0.0"
  # rx https://pub.flutter-io.cn/packages/rxdart
  rxdart: ^0.28.0
  # 图片加载增强 https://pub.flutter-io.cn/packages/cached_network_image
  cached_network_image: ^3.2.3
  # toast https://pub.flutter-io.cn/packages/toastification
  toastification: ^3.0.3
  # 日志打印 https://pub.flutter-io.cn/packages/talker
  talker: ^5.0.0 # 控制台日志
  talker_flutter: ^5.0.0 # 针对Flutter的扩展, 直接使用
  talker_dio_logger: ^5.0.0 # dio日志
  # svg https://pub.flutter-io.cn/packages/flutter_svg
  flutter_svg: ^2.0.5
  # 持久化 https://pub.flutter-io.cn/packages/shared_preferences
  shared_preferences: ^2.3.2
  # 间接依赖
  crypto: ^3.0.0
  uuid: ^4.0.0
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: any
  flutter_lints: any

flutter:
  assets:
    - assets/city_picker/china_regions.json
